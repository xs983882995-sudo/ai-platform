<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Platform</title>

<style>

body{
font-family:Arial;
background:#f7f7f7;
margin:0;
}

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:40px;
border-radius:15px;
}

h1{
font-size:40px;
}

textarea{
width:100%;
height:150px;
padding:15px;
font-size:16px;
}

button{

background:#000;
color:white;
border:none;
padding:12px 30px;
font-size:16px;
border-radius:8px;
margin-top:15px;
cursor:pointer;

}

#result{

margin-top:30px;
background:#f1f1f1;
padding:20px;
border-radius:10px;

}

</style>

</head>


<body>


<div class="container">


<h1>AI Platform</h1>

<p>
Create content, ideas and solutions with AI.
</p>


<textarea id="input"
placeholder="输入你的需求...">
</textarea>


<br>


<button onclick="generate()">
Generate
</button>


<div id="result">
等待输入...
</div>


</div>



<script>

async function generate(){


let text=document.getElementById("input").value;


document.getElementById("result").innerHTML=
"正在生成...";


let response=
await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:text

})

});


let data=
await response.json();



document.getElementById("result").innerHTML=
data.reply;


}


</script>


</body>
</html>
