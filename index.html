<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Platform</title>

<style>
body {
    font-family: Arial;
    max-width:700px;
    margin:50px auto;
}

textarea {
    width:100%;
    height:120px;
}

button {
    padding:10px 20px;
    margin-top:10px;
}

#result {
    margin-top:20px;
    background:#f5f5f5;
    padding:20px;
}
</style>

</head>

<body>

<h1>AI Platform</h1>

<p>输入你的需求：</p>

<textarea id="input"></textarea>

<br>

<button onclick="generate()">
生成
</button>


<div id="result"></div>


<script>

async function generate(){

let message =
document.getElementById("input").value;


let response =
await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

});


let data =
await response.json();


document.getElementById("result").innerHTML =
data.reply;

}

</script>


</body>
